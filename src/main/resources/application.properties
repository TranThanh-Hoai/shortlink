spring.application.name=shortlink

# Cấu hình PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/shortlink
spring.datasource.username=admin
spring.datasource.password=password123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Cấu hình Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379
spring.cache.type=caffeine

# Rate Limiting
app.ratelimit.enabled=true
app.ratelimit.capacity=10
app.ratelimit.refill-tokens=10
app.ratelimit.refill-minutes=1
# Danh sách IP của proxy/CDN tin cậy (cách nhau bởi dấu phẩy) để chống IP spoofing
app.ratelimit.trusted-proxies=127.0.0.1

# Đảm bảo trả về 404 khi tìm thấy route không tồn tại
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
# Actuator & Monitoring
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=shortlink-async-
