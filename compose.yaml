services:
  shortlink-app:
    build: .
    image: tranhoai/shortlink
    container_name: shortlink-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/shortlink
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: shortlink-db
    environment:
      - POSTGRES_DB=shortlink
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shortlink-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
