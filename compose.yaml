services:
  shortlink-app:
    build: .
    image: tranhoai/shortlink
    container_name: shortlink-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=admin
      - DB_PASSWORD=password123
      - DB_DRIVER=org.postgresql.Driver
      - DB_URL=jdbc:postgresql://postgres:5432/${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: shortlink-db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shortlink-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
