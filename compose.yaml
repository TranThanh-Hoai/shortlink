services:
  shortlink-app:
    build: .
    image: tranhoai/shortlink
    container_name: shortlink-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_USERNAME=admin
      - DB_PASSWORD=password123
      - REDIS_HOST=redis
      - JWT_SECRET=QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUE=
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/shortlink
    depends_on:
      - postgres
      - redis

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: shortlink-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:12.2.0
    container_name: shortlink-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-change-me}
    depends_on:
      - prometheus
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana

  postgres:
    image: postgres:16-alpine
    container_name: shortlink-db
    environment:
      - POSTGRES_DB=shortlink
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shortlink-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  grafana_data:
