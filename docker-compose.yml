services:
  postgres:
    image: postgres:16-alpine
    container_name: shortlink-db
    environment:
      - POSTGRES_DB=shortlink
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
